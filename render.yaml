services:
  - type: web
    name: quantum-solar-backend
    runtime: python
    repo: https://github.com/mindtechindustriesai-alt/quantum-solar-backend
    plan: free
    branch: main
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
